# No [python: ...] mapping: every translatable string in this project is a
# {{ _('...') }} call in a Jinja2 template, never a bare _('...') in Python
# source -- and the pure-Python `tokenize` module pybabel's Python extractor
# uses (a different, older re-implementation than the real C parser
# ast.parse()/compile() use) chokes on modern f-string syntax that's valid,
# working Python in several of this project's files, aborting the entire
# extraction with "EOF in multi-line string/statement" before it ever reaches
# the templates below. Since there is nothing to extract from .py files
# anyway, the fix is to not ask it to.
#
# extensions=jinja2.ext.autoescape,jinja2.ext.with_ was removed for the same
# reason it now crashes extraction: both became core, always-on Jinja2
# behavior in 2.9+ and were deleted as separate extension classes in Jinja2
# 3.0 -- import_string("jinja2.ext.autoescape") raises AttributeError on any
# current Jinja2.
[jinja2: src/mediaforge/web/templates/**.html]
