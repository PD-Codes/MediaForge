name: "PR Conflict Labeler"

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  label_conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label PRs with conflicts
        uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "has conflicts"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          commentOnDirty: "Dieser Pull Request hat leider Merge-Konflikte. Bitte löse diese auf, damit wir den Code mergen können!"
