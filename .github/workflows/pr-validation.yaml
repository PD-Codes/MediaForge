name: "PR Title Validation"

# pull_request_target is required here for the write-scoped GITHUB_TOKEN
# (statuses: write), but this workflow never checks out PR code, so there is
# no fork-code-execution risk. The Python syntax check, which does need to
# check out fork code, lives in its own pull_request-triggered workflow
# (python-syntax-check.yaml) to keep it out of this trusted context.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read
  statuses: write

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
