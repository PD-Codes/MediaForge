name: "Python Syntax Check"

# Uses pull_request (not pull_request_target) on purpose: this job checks out
# and lints untrusted fork PR code, and does not need repo secrets or a
# write-scoped GITHUB_TOKEN, so it runs safely with the default read-only,
# secret-less fork token. Split out of pr-validation.yaml, which still needs
# pull_request_target for its write-scoped PR title status check.
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Lint for syntax errors
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
