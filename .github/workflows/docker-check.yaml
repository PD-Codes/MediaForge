name: Test Build Docker

# Uses pull_request (not pull_request_target) on purpose: this job checks out
# and builds untrusted fork PR code, and does not need repo secrets or a
# write-scoped GITHUB_TOKEN, so it runs safely with the default read-only,
# secret-less fork token.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'src/**'
      - '.dockerignore'

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mediaforge:pr-test
